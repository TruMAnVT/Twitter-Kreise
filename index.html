<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter-Kreis</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 data-i18n="title">Twitter-Kreis</h1>
            <div class="header-controls">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" data-i18n="themeLight">☀️
                    Hell</button>
                <button class="language-toggle" onclick="toggleLanguage()" id="langBtn">🇩🇪 DE</button>
            </div>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="urlInput" data-i18n-placeholder="urlPlaceholder"
                    placeholder="Bild-URL oder Twitter/X-Benutzername (z.B. @tru_vt)" />
                <button class="btn btn-primary" onclick="addImage()" data-i18n="addButton">Hinzufügen</button>
            </div>
            <div id="previewContainer" class="preview-container">
                <div class="preview-loading" id="previewLoading">
                    <span class="spinner"></span>
                    <span data-i18n="loadingPreview">Lade Vorschau...</span>
                </div>
                <div class="preview-result" id="previewResult">
                    <img id="previewImage" src="" alt="Vorschau">
                    <span id="previewUsername"></span>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="clearAll()" data-i18n="clearAll">Alle löschen</button>
            </div>
        </div>

        <div class="canvas-section">
            <h2 data-i18n="circleView">Kreisansicht</h2>
            <div id="canvasContainer">
                <canvas id="imageCanvas" width="1000" height="1000"></canvas>
            </div>
            <div id="canvasEmpty" class="canvas-empty" data-i18n="addImagesToSeeCircle">Fügen Sie Bilder hinzu, um die
                Kreisansicht zu sehen.</div>
            <div class="canvas-actions">
                <!--
                <div class="export-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="includeBackground" checked>
                        Hintergrund einschließen
                    </label>
                </div>
                <button class="btn btn-primary" onclick="copyCanvasToClipboard()" id="copyBtn">In Zwischenablage
                    kopieren</button>
                <button class="btn btn-secondary" onclick="showCanvasAsPng()" id="previewPngBtn">PNG anzeigen</button>
                <div id="copySuccess" class="copy-success">Bild wurde in die Zwischenablage kopiert!</div>
                -->
                <div class="copy-hint" data-i18n="rightClickHint">Bitte Rechtsklick auf das Bild und „Bild kopieren“
                    verwenden.</div>
            </div>
            <div id="pngPreviewContainer" class="png-preview-container"></div>
        </div>

        <div id="gallery" class="gallery"></div>

        <div id="emptyState" class="empty-state">
            <p data-i18n="noImagesAdded">Noch keine Bilder hinzugefügt. Geben Sie eine Bild-URL ein, um zu beginnen.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
